# pytest.ini - ADD this line
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
qt_api = pyqt5
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    admin_required: tests requiring administrator privileges
    slow: slow running tests
    ui: UI tests requiring display
