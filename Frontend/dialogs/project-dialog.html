<div
    id="projectDialog"
    class="dialog hidden"
>

    <div
        class="dialog-content"
    >

        <div
            class="dialog-header"
        >

            <h2>
                Create Project
            </h2>

            <button
                id="closeDialogBtn"
            >
                ✕
            </button>

        </div>

        <form
            id="projectForm"
        >

            <div class="form-group">

                <label>
                    Company Name
                </label>

                <input
                    id="companyName"
                    type="text"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    Project Name
                </label>

                <input
                    id="projectName"
                    type="text"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    Location
                </label>

                <input
                    id="location"
                    type="text"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    Project Capacity (MW)
                </label>

                <input
                    id="capacity"
                    type="number"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    Turbine Model
                </label>

                <input
                    id="turbineModel"
                    type="text"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    Rated Power (kW)
                </label>

                <input
                    id="ratedPower"
                    type="number"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    Description
                </label>

                <textarea
                    id="description"
                    rows="4"
                ></textarea>

            </div>

            <div
                class="dialog-actions"
            >

                <button
                    type="submit"
                    class="primary-btn"
                >
                    Create Project
                </button>

            </div>

        </form>

    </div>

</div>
